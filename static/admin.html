<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Logoped-IA Examen</title>
  <style>
    :root {
      --primary: #6C3CE1;
      --primary-light: #8B5CF6;
      --accent: #10B981;
      --danger: #EF4444;
      --warn: #F59E0B;
      --bg: #0F0F1A;
      --card: #1A1A2E;
      --border: #2D2D4E;
      --text: #E2E8F0;
      --text-muted: #94A3B8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 1rem;
    }
    .topbar-title { font-weight: 700; font-size: 1.1rem; color: var(--primary-light); }
    .topbar-actions { display: flex; gap: 0.8rem; }
    .btn-sm {
      padding: 0.45rem 1rem;
      border-radius: 0.4rem;
      font-size: 0.85rem;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      text-decoration: none;
      transition: border-color 0.15s;
    }
    .btn-sm:hover { border-color: var(--primary-light); color: var(--primary-light); }
    .btn-sm.accent { background: var(--accent); border-color: var(--accent); color: white; }
    .btn-sm.accent:hover { opacity: 0.85; color: white; }

    .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

    /* KPI cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .kpi-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.8rem;
      padding: 1.2rem 1.4rem;
    }
    .kpi-label { font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
    .kpi-value { font-size: 2rem; font-weight: 800; color: var(--primary-light); }
    .kpi-sub { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.2rem; }

    /* Sección */
    .section { margin-bottom: 2rem; }
    .section-title { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; color: var(--text); }

    /* Distribución niveles */
    .niveles-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .nivel-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.6rem;
      padding: 0.7rem 1rem;
    }
    .nivel-name { flex: 1; font-size: 0.9rem; }
    .nivel-count { font-size: 0.85rem; color: var(--text-muted); min-width: 3rem; text-align: right; }
    .nivel-bar-bg { flex: 2; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .nivel-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 3px; }

    /* Tabla preguntas */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0.7rem 0.8rem;
      text-align: left;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
    }
    td { padding: 0.7rem 0.8rem; border-bottom: 1px solid var(--border); }
    tr:hover td { background: rgba(108,60,225,0.05); }
    .bar-cell { display: flex; align-items: center; gap: 0.6rem; }
    .mini-bar-bg { flex: 1; height: 5px; background: var(--border); border-radius: 2px; overflow: hidden; min-width: 60px; }
    .mini-bar-fill { height: 100%; border-radius: 2px; }
    .pct-text { font-size: 0.8rem; color: var(--text); min-width: 3rem; text-align: right; }

    /* Tabla participantes */
    .tag {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 1rem;
      font-size: 0.72rem;
    }
    .tag-verde { background: rgba(16,185,129,0.15); color: #34D399; border: 1px solid rgba(16,185,129,0.3); }
    .tag-azul  { background: rgba(108,60,225,0.15); color: #A78BFA; border: 1px solid rgba(108,60,225,0.3); }
    .tag-naranja { background: rgba(245,158,11,0.15); color: #FCD34D; border: 1px solid rgba(245,158,11,0.3); }
    .tag-rojo  { background: rgba(239,68,68,0.15); color: #FCA5A5; border: 1px solid rgba(239,68,68,0.3); }

    .loading-msg { text-align: center; color: var(--text-muted); padding: 3rem; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--primary-light); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .container { padding: 1rem; }
      .topbar { padding: 1rem; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">🎓 Logoped-IA · Panel de Resultados</span>
  <div class="topbar-actions">
    <button class="btn-sm" onclick="cargarDatos()">🔄 Actualizar</button>
    <button class="btn-sm accent" onclick="exportarCsv()">⬇ Exportar CSV</button>
    <a href="/" class="btn-sm">← Ver examen</a>
  </div>
</div>

<div class="container" id="main-content">
  <div class="loading-msg">
    <div class="spinner"></div>
    Cargando datos…
  </div>
</div>

<script>
const adminToken = localStorage.getItem("logoped_ia_admin_token") || "";

async function cargarDatos() {
  const container = document.getElementById("main-content");
  container.innerHTML = `<div class="loading-msg"><div class="spinner"></div>Cargando datos…</div>`;

  try {
    const res = await fetch("/api/admin/resultados", {
      headers: adminToken ? { "X-Admin-Token": adminToken } : {}
    });
    if (res.status === 401) {
      pedirToken();
      return;
    }
    const data = await res.json();
    renderDashboard(data, container);
  } catch(e) {
    container.innerHTML = `<div class="loading-msg" style="color:#FCA5A5">Error cargando datos. ¿Está el servidor activo?</div>`;
  }
}

function pedirToken() {
  const actual = localStorage.getItem("logoped_ia_admin_token") || "";
  const token = window.prompt("Introduce el token del panel admin", actual);
  if (!token) {
    document.getElementById("main-content").innerHTML = `<div class="loading-msg" style="color:#FCA5A5">Se necesita token para acceder al panel.</div>`;
    return;
  }
  localStorage.setItem("logoped_ia_admin_token", token.trim());
  window.location.reload();
}

function exportarCsv() {
  const token = localStorage.getItem("logoped_ia_admin_token") || "";
  const url = token ? `/api/admin/exportar?token=${encodeURIComponent(token)}` : "/api/admin/exportar";
  window.location.href = url;
}

function renderDashboard(data, container) {
  const { participantes, stats, niveles_distribucion, pregunta_stats } = data;
  const total = stats.total_participantes || 0;

  // ── KPIs ──
  let kpiHtml = `
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Participantes</div>
        <div class="kpi-value">${total}</div>
        <div class="kpi-sub">Total exámenes realizados</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Media global</div>
        <div class="kpi-value">${stats.media_porcentaje ?? "—"}%</div>
        <div class="kpi-sub">Porcentaje de acierto medio</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Máximo</div>
        <div class="kpi-value">${stats.max_porcentaje ?? "—"}%</div>
        <div class="kpi-sub">Mejor resultado</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Mínimo</div>
        <div class="kpi-value">${stats.min_porcentaje ?? "—"}%</div>
        <div class="kpi-sub">Resultado más bajo</div>
      </div>
    </div>
  `;

  if (total === 0) {
    container.innerHTML = kpiHtml + `<div class="loading-msg">No hay participantes aún. Comparte el enlace del examen.</div>`;
    return;
  }

  // ── DISTRIBUCIÓN NIVELES ──
  let nivelesHtml = `<div class="section"><div class="section-title">Distribución por nivel</div><div class="niveles-list">`;
  for (const n of niveles_distribucion) {
    const pct = total > 0 ? Math.round((n.cantidad / total) * 100) : 0;
    nivelesHtml += `
      <div class="nivel-row">
        <span class="nivel-name">${n.nivel}</span>
        <div class="nivel-bar-bg"><div class="nivel-bar-fill" style="width:${pct}%"></div></div>
        <span class="nivel-count">${n.cantidad} · ${pct}%</span>
      </div>`;
  }
  nivelesHtml += `</div></div>`;

  // ── PREGUNTAS MÁS FALLADAS ──
  const ordenadas = [...pregunta_stats].sort((a, b) => a.tasa_acierto - b.tasa_acierto);
  let pregHtml = `<div class="section"><div class="section-title">Preguntas por tasa de acierto</div><div class="table-wrap"><table>
    <thead><tr><th>#</th><th>Pregunta</th><th>Bloque</th><th>Acierto</th></tr></thead><tbody>`;
  ordenadas.forEach((p, i) => {
    const color = p.tasa_acierto >= 70 ? "#34D399" : p.tasa_acierto >= 40 ? "#FCD34D" : "#FCA5A5";
    pregHtml += `<tr>
      <td style="color:var(--text-muted)">${p.id}</td>
      <td>${p.pregunta.length > 80 ? p.pregunta.slice(0,80)+"…" : p.pregunta}</td>
      <td><span style="color:var(--primary-light);font-size:0.8rem">${p.bloque}</span></td>
      <td>
        <div class="bar-cell">
          <div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${p.tasa_acierto}%;background:${color}"></div></div>
          <span class="pct-text" style="color:${color}">${p.tasa_acierto}%</span>
        </div>
      </td>
    </tr>`;
  });
  pregHtml += `</tbody></table></div></div>`;

  // ── PARTICIPANTES ──
  let partHtml = `<div class="section"><div class="section-title">Participantes (${total})</div><div class="table-wrap"><table>
    <thead><tr><th>Nombre</th><th>Profesión</th><th>Nivel</th><th>%</th><th>Puntos</th><th>Tiempo</th><th>Fecha</th></tr></thead><tbody>`;
  participantes.forEach(p => {
    const tag = nivelTag(p.nivel);
    const mins = Math.floor(p.tiempo_segundos / 60);
    const secs = p.tiempo_segundos % 60;
    const fechaCorta = p.fecha ? p.fecha.slice(0,16).replace("T"," ") : "—";
    partHtml += `<tr>
      <td><strong>${p.nombre}</strong>${p.email ? `<br><span style="font-size:0.78rem;color:var(--text-muted)">${p.email}</span>` : ""}</td>
      <td style="color:var(--text-muted);font-size:0.82rem">${p.profesion || "—"}</td>
      <td><span class="tag ${tag.cls}">${p.nivel}</span></td>
      <td><strong style="color:${tag.color}">${p.porcentaje}%</strong></td>
      <td>${p.puntuacion}/${data.stats.total_preguntas_sesion || "—"}</td>
      <td style="color:var(--text-muted)">${mins}m ${secs}s</td>
      <td style="color:var(--text-muted);font-size:0.8rem">${fechaCorta}</td>
    </tr>`;
  });
  partHtml += `</tbody></table></div></div>`;

  container.innerHTML = kpiHtml + nivelesHtml + pregHtml + partHtml;
}

function nivelTag(nivel) {
  if (!nivel) return { cls: "tag-azul", color: "#A78BFA" };
  if (nivel.includes("Pionero"))   return { cls: "tag-verde",   color: "#34D399" };
  if (nivel.includes("Experto"))   return { cls: "tag-verde",   color: "#34D399" };
  if (nivel.includes("aplicado"))  return { cls: "tag-azul",    color: "#A78BFA" };
  if (nivel.includes("Explorando"))return { cls: "tag-naranja", color: "#FCD34D" };
  return { cls: "tag-rojo", color: "#FCA5A5" };
}

cargarDatos();
</script>
</body>
</html>
